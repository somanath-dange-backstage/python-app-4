name: python-app-4-cicd

permissions:
  contents: write

on:
  push:
    branches: 
      - main
jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create SonarCloud project if not exists
        run: |
          curl -s \
            -u ${{ secrets.SONAR_TOKEN }}: \
            -X POST "https://sonarcloud.io/api/projects/create" \
            -d "name=${{ github.event.repository.name }}&project=${{ github.event.repository.name }}&organization=somanath-dange-backstage"

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=somanath-dange-backstage
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.sources=src

  build:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_ENV

      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: sdange/python-app-4:${{ env.SHORT_SHA }}
    outputs:
      COMMIT_ID: ${{ env.SHORT_SHA }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Modify values file
        shell: bash
        run: |
          echo 
          # install a proper yq binary via apt instead of pip
          sudo apt-get update && sudo apt-get install -y yq
          yq -Yi '.image.tag = "${{needs.build.outputs.commit_id}}"' charts/python-app-4/values-dev.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Updates values.yaml with commit ${{needs.build.outputs.commit_id}}'

      - name: Install argocd
        shell: bash
        run: |
          echo "Installing argocd"
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/
            
      - name: argocd login
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure  \
            --grpc-web \
            --username admin \
            --password  ${{ secrets.ARGOCD_PASSWORD }}
          
      - name: Ensure argocd repo and app
        shell: bash
        run: |

          # Connects the argocd repo
          repo="https://github.com/somanath-dange-backstage/python-app-4.git"
          argocd repo list | grep -q $repo || argocd repo add $repo

          # Creates the argocd app
          argocd app get python-app-4 || argocd app create python-app-4 \
            --repo $repo \
            --path charts/python-app-4 \
            --dest-namespace dev \
            --dest-server https://kubernetes.default.svc \
            --values values-dev.yaml \
            --revision main \
            --sync-policy manual \
            --sync-option CreateNamespace=true

      - name: Argocd app sync
        shell: bash
        run: |
          echo "Logging into argocd server"
          argocd login argocd-server.argocd \
            --insecure  \
            --grpc-web \
            --username admin \
            --password  ${{ secrets.ARGOCD_PASSWORD }}
          echo "Running argocd app sync"
          argocd app sync python-app-4
          argocd app wait python-app-4 --timeout 180
